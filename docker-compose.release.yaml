version: '3.5'

x-meta: &meta
  version: 1.7.0.3
  level: ITMM

x-main-config:
  &main
  logging:
    options:
      max-size: 20m
      max-file: '50'
    driver: json-file
  restart: always
  networks:
    - itmm_network

services:
  itmm-server:
    container_name: itmm-server
    image: docker-registry.cyberlympha.com/itm/udv/itmm/itmm_server:1.7.0.3
    hostname: ${HOSTNAME}
    extra_hosts:
      - host.docker.internal:host-gateway
    ports:
      - published: ${ITMM_SERVER_PORT:-10051}
        target: 10051
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./env/mibs:/var/lib/itmm/mibs:ro
      - ./env/externalscripts:/usr/lib/itmm/externalscripts:ro
      - itmm_snmptraps:/var/lib/itmm/snmptraps:ro
      - mibs:/var/lib/mibs:ro
    env_file:
      - .env
    stop_grace_period: 30s
    <<: *main

  itmm-front:
    container_name: itmm-front
    image: docker-registry.cyberlympha.com/itm/udv/itmm/itmm_front:1.7.0.3
    hostname: ${HOSTNAME}
    extra_hosts:
      - host.docker.internal:host-gateway
    ports:
      - published: ${ITMM_FRONT_HTTP_PORT:-80}
        target: 8080
      - published: ${ITMM_FRONT_HTTPS_PORT:-443}
        target: 8443
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./env/nginx/certs:/etc/ssl/nginx:ro
      - itmm_meta_data:/share/:ro
    env_file:
      - .env
    environment:
      ITMM_SERVER_NAME: 1.7.0.3
      HTTPS_PORT: ${ITMM_FRONT_HTTPS_PORT:-443}
    healthcheck:
      test: curl -f http://localhost:8080/ping || exit 1
      start_period: 40s
      interval: 1m30s
      timeout: 3s
      retries: 3
    depends_on:
      - itmm-server
    stop_grace_period: 10s
    <<: *main

  itmm-snmptraps:
    container_name: itmm-snmptraps
    image: docker-registry.cyberlympha.com/itm/udv/snmptraps:v1.1.3
    ports:
      - published: 162
        target: 1162
        protocol: udp
    volumes:
      - ./env/mibs:/var/lib/itm/mibs:ro
      - itmm_snmptraps:/var/lib/itm/snmptraps:rw
      - mibs:/var/lib/mibs:rw
    <<: *main

  itmm-synchronizer:
    container_name: itmm-synchronizer
    image: docker-registry.cyberlympha.com/itm/udv/itmm/itmm_synchronizer:1.7.0.3
    hostname: ${HOSTNAME}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - itmm_meta_data:/share/:rw
    environment:
      SYNCHRONIZATION_ENABLED: ${SYNCHRONIZATION_ENABLED:-false}
      ITMM_VERSION: 1.7.0.3
      DATAPK_HOST: ${DATAPK_HOST:-}
      DATAPK_PORT: ${DATAPK_PORT:-443}
      DATAPK_VERSION: ${DATAPK_VERSION:-19}
      DATAPK_USER: ${DATAPK_USER:-datapk}
      DATAPK_PASSWORD: ${DATAPK_PASSWORD:-datapk}
      ITMM_HOST: https://itmm-front
      ITMM_PORT: 8443
      ITMM_USER: ${ITMM_USER:-itm}
      ITMM_PASSWORD: ${ITMM_PASSWORD:-ChangeMe}
      SYNCHRONIZATION_DELAY_SECONDS: ${SYNCHRONIZATION_DELAY_SECONDS:-3600}
    depends_on:
      itmm-front:
        condition: service_healthy
    <<: *main
    restart: on-failure

networks:
  itmm_network:
    driver: bridge
    driver_opts:
      com.docker.network.enable_ipv6: 'false'
    ipam:
      driver: default
      config:
        - subnet: ${ITMM_SUBNET:-172.16.239.0/24}
          gateway: ${ITMM_SUBNET_GATEWAY:-172.16.239.1}

volumes:
  itmm_snmptraps: null
  itmm_meta_data: null
  mibs: null
